<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Viewer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0d1117;
  --surface:  #161b22;
  --card:     #0d1117;
  --border:   #30363d;
  --border2:  #3d444d;
  --text:     #c9d1d9;
  --muted:    #8b949e;
  --dim:      #484f58;
  --accent:   #58a6ff;
  --green:    #3fb950;
  --red:      #f85149;
  --yellow:   #d29922;
  --orange:   #e07030;

  --good:     #3fb950;
  --caution:  #d29922;
  --warning:  #e07030;
  --critical: #f85149;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ═══ HEADER ═══════════════════════════════════════════ */
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  padding-top: env(safe-area-inset-top);
  height: calc(48px + env(safe-area-inset-top));
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.hd-title { font-size: 14px; font-weight: 700; color: var(--accent); letter-spacing: -.2px; }
.hd-sep   { flex: 1; }

.tabs { display: flex; gap: 2px; }
.tab {
  font-size: 12px; font-weight: 500;
  padding: 6px 14px;
  border-radius: 6px;
  border: none; background: transparent;
  color: var(--muted); cursor: pointer;
  transition: all .15s;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}
.tab:hover  { color: var(--text); background: rgba(255,255,255,.05); }
.tab.active { color: var(--accent); background: rgba(88,166,255,.12); }

/* ═══ VIEWS ════════════════════════════════════════════ */
.view { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
.view[hidden] { display: none; }

/* ═══ DASHBOARD ════════════════════════════════════════ */
.dash-scroll {
  flex: 1; overflow-y: auto;
  padding: 16px;
  padding-bottom: max(16px, env(safe-area-inset-bottom));
  -webkit-overflow-scrolling: touch;
}

/* System card */
.sys-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  margin-bottom: 16px;
}
.sys-title {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .8px;
  color: var(--muted); margin-bottom: 14px;
}
.sys-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.sys-row:last-child { margin-bottom: 0; }
.sys-label { font-size: 12px; color: var(--muted); min-width: 70px; }
.sys-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.sys-bar { height: 100%; border-radius: 3px; transition: width .6s ease; }
.sys-val { font-size: 12px; font-weight: 600; min-width: 48px; text-align: right; }
.sys-pills { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.sys-pill {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--muted);
}
.sys-pill strong { color: var(--text); }

/* Section label */
.sec-label {
  font-size: 11px; font-weight: 600;
  color: var(--muted); text-transform: uppercase;
  letter-spacing: .7px; margin-bottom: 10px;
}

/* App cards grid */
.app-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.app-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left-width: 3px;
  border-radius: 10px;
  padding: 14px;
  cursor: pointer;
  transition: background .15s, border-color .15s;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  overflow: hidden;
}
.app-card:hover  { background: rgba(255,255,255,.03); }
.app-card:active { opacity: .85; }

.app-card[data-health="good"]     { border-left-color: var(--good); }
.app-card[data-health="caution"]  { border-left-color: var(--caution); }
.app-card[data-health="warning"]  { border-left-color: var(--warning); }
.app-card[data-health="critical"] { border-left-color: var(--critical); }

.card-name {
  font-size: 12px; font-weight: 600;
  color: var(--text); margin-bottom: 4px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.card-status {
  font-size: 11px; font-weight: 500; margin-bottom: 10px;
}
.card-status[data-health="good"]     { color: var(--good); }
.card-status[data-health="caution"]  { color: var(--caution); }
.card-status[data-health="warning"]  { color: var(--warning); }
.card-status[data-health="critical"] { color: var(--critical); }

.card-stats { display: flex; flex-direction: column; gap: 4px; }
.stat-row { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; gap: 4px; }
.stat-val { color: var(--text); font-weight: 500; }
.stat-val.warn { color: var(--yellow); }
.stat-val.bad  { color: var(--red); }

.card-arrow {
  position: absolute; top: 10px; right: 10px;
  font-size: 11px; color: var(--dim);
}

/* ═══ LOG VIEW ══════════════════════════════════════════ */
.app-strip {
  display: none;
  overflow-x: auto; overflow-y: hidden;
  white-space: nowrap; padding: 8px 12px; gap: 6px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.app-strip::-webkit-scrollbar { display: none; }

.app-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px; border-radius: 99px;
  border: 1px solid var(--border);
  font-size: 12px; cursor: pointer;
  color: var(--muted); background: transparent;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.app-pill.active { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,.1); }

.log-main { display: flex; flex: 1; overflow: hidden; }

/* Sidebar (desktop) */
.sidebar {
  width: 190px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto; padding: 8px 0;
}
.sidebar-label {
  font-size: 10px; font-weight: 600;
  color: var(--muted); text-transform: uppercase; letter-spacing: .8px;
  padding: 6px 14px 4px;
}
.app-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; cursor: pointer;
  border-left: 2px solid transparent;
  font-size: 12px; transition: background .1s;
  -webkit-tap-highlight-color: transparent;
}
.app-item:hover  { background: rgba(255,255,255,.04); }
.app-item.active { background: rgba(88,166,255,.1); border-left-color: var(--accent); color: var(--accent); }
.app-restarts    { font-size: 10px; color: var(--muted); }

/* Dot */
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot.online  { background: var(--green); box-shadow: 0 0 4px var(--green); }
.dot.stopped { background: var(--dim); }
.dot.errored { background: var(--red); }

/* Log pane */
.log-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Analysis panel */
.analyze-panel {
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  overflow: hidden;
}
.analyze-panel[hidden] { display: none; }
.analyze-inner { padding: 14px 16px; }
.analyze-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.analyze-verdict {
  font-size: 13px; font-weight: 700;
  padding: 3px 10px; border-radius: 99px;
}
.analyze-verdict.good     { background: rgba(63,185,80,.15);  color: var(--good); }
.analyze-verdict.caution  { background: rgba(210,153,34,.15); color: var(--caution); }
.analyze-verdict.warning  { background: rgba(224,112,48,.15); color: var(--warning); }
.analyze-verdict.critical { background: rgba(248,81,73,.15);  color: var(--critical); }
.analyze-meta { font-size: 11px; color: var(--muted); flex: 1; }
.analyze-close {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 16px; padding: 2px 6px;
  border-radius: 4px; line-height: 1;
  -webkit-tap-highlight-color: transparent;
}
.analyze-close:hover { color: var(--text); background: rgba(255,255,255,.06); }
.analyze-stats { display: flex; gap: 16px; margin-bottom: 10px; flex-wrap: wrap; }
.a-stat { font-size: 12px; }
.a-stat span { font-weight: 600; }
.a-stat .ok  { color: var(--green); }
.a-stat .err { color: var(--red); }
.a-stat .wrn { color: var(--yellow); }
.analyze-advice { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 10px; }
.analyze-advice li { margin-left: 14px; }
.analyze-errors { font-size: 11px; }
.analyze-errors summary {
  cursor: pointer; color: var(--muted); margin-bottom: 6px;
  font-weight: 500;
  -webkit-tap-highlight-color: transparent;
}
.err-line {
  font-family: 'SF Mono', ui-monospace, monospace;
  font-size: 10.5px; color: var(--red);
  background: rgba(248,81,73,.07);
  border-left: 2px solid var(--red);
  padding: 4px 8px; margin: 3px 0;
  border-radius: 0 4px 4px 0;
  word-break: break-all; line-height: 1.5;
}

/* Toolbar */
.toolbar {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0; flex-wrap: wrap;
}
.toolbar .app-title {
  font-size: 13px; font-weight: 600;
  max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.toolbar .sep { flex: 1; }
.filter-group { display: flex; gap: 3px; }
.btn {
  font-size: 11px; padding: 5px 10px; min-height: 30px;
  border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--muted);
  cursor: pointer; font-family: inherit;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.btn:hover  { color: var(--text); background: rgba(255,255,255,.05); }
.btn.active { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,.1); }
.btn.analyze-btn.loading { opacity: .6; pointer-events: none; }

/* Log output */
.log-output {
  flex: 1; overflow-y: auto;
  font-family: 'SF Mono', ui-monospace, Consolas, monospace;
  font-size: 12px; line-height: 1.6;
  padding: 8px 0;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
.log-line { display: flex; padding: 1px 12px; gap: 8px; word-break: break-all; }
.log-line:hover { background: rgba(255,255,255,.02); }
.log-line .ln { color: var(--dim); min-width: 32px; text-align: right; flex-shrink: 0; user-select: none; font-size: 11px; }
.log-line .tag {
  font-size: 9px; padding: 2px 4px; border-radius: 3px;
  flex-shrink: 0; align-self: flex-start; margin-top: 3px; font-weight: 700;
}
.log-line .tag.out { background: rgba(63,185,80,.12);  color: var(--green); }
.log-line .tag.err { background: rgba(248,81,73,.12);  color: var(--red); }
.log-line .content { flex: 1; }
.log-line.is-err .content { color: var(--red); }

/* Status bar */
.status-bar {
  padding: 5px 12px;
  padding-bottom: max(5px, env(safe-area-inset-bottom));
  font-size: 11px; color: var(--muted);
  border-top: 1px solid var(--border);
  display: flex; gap: 12px; flex-shrink: 0;
  background: var(--surface);
}
.conn { display: flex; align-items: center; gap: 5px; }
.conn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); }
.conn-dot.live { background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* Empty state */
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--muted); gap: 10px; font-size: 13px; text-align: center;
  padding: 20px;
}
.empty-state svg { opacity: .25; }
.empty-state p { line-height: 1.7; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Loading skeleton */
.skeleton {
  height: 100px; background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  animation: shimmer 1.2s infinite;
}
@keyframes shimmer { 0%,100%{opacity:.5} 50%{opacity:1} }

/* ═══ RESPONSIVE ════════════════════════════════════════ */
@media (max-width: 640px) {
  .sidebar   { display: none; }
  .app-strip { display: flex; }
  .toolbar .app-title { display: none; }
  .log-line .ln { display: none; }
  .log-output { font-size: 11.5px; }
  .log-line   { padding: 1px 10px; gap: 6px; }
  .app-grid   { grid-template-columns: 1fr; }
  .dash-scroll { padding: 12px; }
}
</style>
</head>
<body>

<header>
  <span class="hd-title">Log Viewer</span>
  <span class="hd-sep"></span>
  <nav class="tabs">
    <button class="tab active" data-view="dashboard" onclick="showView('dashboard')">ダッシュボード</button>
    <button class="tab"        data-view="logs"      onclick="showView('logs')">ログ</button>
  </nav>
</header>

<!-- ═══ DASHBOARD VIEW ═══════════════════════════════════ -->
<div id="view-dashboard" class="view">
  <div class="dash-scroll">
    <div class="sys-card" id="sys-card">
      <div class="sys-title">サーバー状態</div>
      <div class="skeleton" style="height:80px"></div>
    </div>
    <div class="sec-label">アプリ一覧</div>
    <div class="app-grid" id="app-grid">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </div>
</div>

<!-- ═══ LOG VIEW ════════════════════════════════════════ -->
<div id="view-logs" class="view" hidden>
  <div class="app-strip" id="app-strip"></div>
  <div class="log-main">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-label">Apps</div>
    </nav>
    <div class="log-pane" id="log-pane">
      <div class="empty-state">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M3 9h18M9 21V9"/>
        </svg>
        <p>アプリを選んでください</p>
      </div>
    </div>
  </div>
</div>

<script>
// ═══ State ═══════════════════════════════════════════════
let currentApp = null, currentSSE = null;
let filter = 'all', follow = true, lineCount = 0;
let allApps = [];

// ═══ View switching ═══════════════════════════════════════
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.hidden = (v.id !== `view-${name}`));
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === name));
  if (name === 'dashboard') loadDashboard();
}

// ═══ Health helpers ═══════════════════════════════════════
function getHealth(a) {
  if (a.status !== 'online') return a.status === 'errored' ? 'critical' : 'critical';
  if (a.restarts > 20 || a.errLineCount > 50) return 'warning';
  if (a.restarts > 5  || a.errLineCount > 10) return 'caution';
  return 'good';
}
const healthLabel = {
  good:     '稼働中・安定',
  caution:  '注意が必要',
  warning:  '不安定・要確認',
  critical: (a) => a.status === 'errored' ? '異常停止' : '停止中',
};

function fmtUptime(ms) {
  if (!ms) return '不明';
  const s = (Date.now() - ms) / 1000;
  if (s < 120)    return '起動直後';
  if (s < 3600)   return `${Math.floor(s/60)}分前から起動`;
  if (s < 86400)  return `${Math.floor(s/3600)}時間前から起動`;
  return `${Math.floor(s/86400)}日前から起動`;
}
function fmtMem(b)  { return b ? `${Math.round(b/1024/1024)}MB` : '–'; }
function fmtBytes(b){ return b < 1024**3 ? `${Math.round(b/1024**2)}MB` : `${(b/1024**3).toFixed(1)}GB`; }
function fmtUpSys(s){
  const d=Math.floor(s/86400), h=Math.floor((s%86400)/3600), m=Math.floor((s%3600)/60);
  return d>0?`${d}日${h}時間`:h>0?`${h}時間${m}分`:`${m}分`;
}
function barColor(pct){ return pct>85?'var(--red)':pct>65?'var(--yellow)':'var(--green)'; }
function memLabel(pct){ return pct>85?'逼迫':pct>65?'注意':'余裕あり'; }

// ═══ Dashboard ═══════════════════════════════════════════
async function loadDashboard() {
  let data;
  try {
    data = await fetch('./api/status').then(r => r.json());
  } catch {
    document.getElementById('sys-card').innerHTML =
      '<div class="sys-title" style="color:var(--red)">サーバーに接続できません</div>';
    return;
  }
  allApps = data.apps;
  renderSysCard(data.system);
  renderAppGrid(data.apps);
  renderSidebar(data.apps);
  renderStrip(data.apps);
}

function renderSysCard(sys) {
  // メモリ: MemAvailable ベース（buff/cache は除外済み）
  const availPct = Math.round(sys.availMem / sys.totalMem * 100);
  const usedPct  = 100 - availPct;
  const memCol   = usedPct > 85 ? 'var(--red)' : usedPct > 70 ? 'var(--yellow)' : 'var(--green)';
  const memNote  = usedPct > 85 ? '⚠ 残りわずか' : usedPct > 70 ? '注意' : '余裕あり';

  // Swap: 使用率が高いと過去に逼迫していたサイン
  const swapPct  = sys.swapTotal > 0 ? Math.round(sys.swapUsed / sys.swapTotal * 100) : 0;
  const swapCol  = swapPct > 70 ? 'var(--red)' : swapPct > 30 ? 'var(--yellow)' : 'var(--green)';
  const swapNote = swapPct > 70 ? '⚠ 高負荷の痕跡あり' : swapPct > 30 ? '過去に負荷あり' : '正常';

  const online = allApps.filter(a => a.status === 'online').length;
  const total  = allApps.length;

  document.getElementById('sys-card').innerHTML = `
    <div class="sys-title">サーバー状態</div>
    <div class="sys-row">
      <span class="sys-label">メモリ空き</span>
      <div class="sys-bar-wrap">
        <div class="sys-bar" style="width:${availPct}%;background:${memCol}"></div>
      </div>
      <span class="sys-val" style="color:${memCol}">${availPct}%</span>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:-4px;margin-bottom:10px;padding-left:80px">
      空き ${fmtBytes(sys.availMem)} / 合計 ${fmtBytes(sys.totalMem)} —
      <span style="color:${memCol}">${memNote}</span>
      <span style="color:var(--dim)">（バッファ除く実質値）</span>
    </div>
    ${sys.swapTotal > 0 ? `
    <div class="sys-row">
      <span class="sys-label">Swap使用</span>
      <div class="sys-bar-wrap">
        <div class="sys-bar" style="width:${swapPct}%;background:${swapCol}"></div>
      </div>
      <span class="sys-val" style="color:${swapCol}">${swapPct}%</span>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:-4px;margin-bottom:4px;padding-left:80px">
      ${fmtBytes(sys.swapUsed)} 使用中 —
      <span style="color:${swapCol}">${swapNote}</span>
      <span style="color:var(--dim)">（Swap高=過去に物理メモリ不足）</span>
    </div>
    ` : ''}
    <div class="sys-pills">
      <div class="sys-pill">
        <span class="dot online"></span>
        稼働中 <strong>${online}</strong> / ${total} アプリ
      </div>
      <div class="sys-pill">⏱ 起動から <strong>${fmtUpSys(sys.uptime)}</strong></div>
      <div class="sys-pill">負荷 <strong>${sys.loadavg[0].toFixed(2)}</strong></div>
    </div>
  `;
}

function renderAppGrid(apps) {
  const grid = document.getElementById('app-grid');
  grid.innerHTML = '';

  for (const a of apps) {
    const h = getHealth(a);
    const label = typeof healthLabel[h] === 'function' ? healthLabel[h](a) : healthLabel[h];

    const rstClass = a.restarts > 20 ? 'bad' : a.restarts > 5 ? 'warn' : '';
    const errClass = a.errLineCount > 50 ? 'bad' : a.errLineCount > 10 ? 'warn' : '';

    const card = document.createElement('div');
    card.className = 'app-card';
    card.dataset.health = h;
    card.innerHTML = `
      <span class="card-arrow">↗</span>
      <div class="card-name">${a.name}</div>
      <div class="card-status" data-health="${h}">${label}</div>
      <div class="card-stats">
        ${a.status === 'online' ? `
          <div class="stat-row">
            <span>起動</span>
            <span class="stat-val">${fmtUptime(a.uptime)}</span>
          </div>
          <div class="stat-row">
            <span>再起動</span>
            <span class="stat-val ${rstClass}">${a.restarts}回${a.restarts>5?' ⚠':''}
            </span>
          </div>
          <div class="stat-row">
            <span>エラーログ</span>
            <span class="stat-val ${errClass}">${a.errLineCount>0?a.errLineCount+'件':'なし'}</span>
          </div>
          <div class="stat-row">
            <span>メモリ</span>
            <span class="stat-val">${fmtMem(a.memory)}</span>
          </div>
        ` : `
          <div class="stat-row">
            <span>状態</span>
            <span class="stat-val bad">${a.status === 'errored' ? 'クラッシュ' : '手動停止'}</span>
          </div>
          <div class="stat-row">
            <span>再起動</span>
            <span class="stat-val ${rstClass}">${a.restarts}回</span>
          </div>
        `}
      </div>
    `;
    card.addEventListener('click', () => { showView('logs'); openApp(a.name); });
    grid.appendChild(card);
  }
}

// ═══ Sidebar & Strip ══════════════════════════════════════
function renderSidebar(apps) {
  const sb = document.getElementById('sidebar');
  const frag = document.createDocumentFragment();
  const lbl = document.createElement('div');
  lbl.className = 'sidebar-label'; lbl.textContent = 'Apps';
  frag.appendChild(lbl);
  for (const a of (apps || allApps)) {
    const el = document.createElement('div');
    el.className = 'app-item' + (a.name === currentApp ? ' active' : '');
    el.dataset.name = a.name;
    const sc = a.status === 'online' ? 'online' : a.status === 'errored' ? 'errored' : 'stopped';
    el.innerHTML = `
      <span class="dot ${sc}"></span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.name}</span>
      ${a.restarts > 5 ? `<span class="app-restarts">↺${a.restarts}</span>` : ''}
    `;
    el.addEventListener('click', () => openApp(a.name));
    frag.appendChild(el);
  }
  sb.innerHTML = ''; sb.appendChild(frag);
}

function renderStrip(apps) {
  const strip = document.getElementById('app-strip');
  strip.innerHTML = '';
  for (const a of (apps || allApps)) {
    const el = document.createElement('div');
    el.className = 'app-pill' + (a.name === currentApp ? ' active' : '');
    el.dataset.name = a.name;
    const sc = a.status === 'online' ? 'online' : a.status === 'errored' ? 'errored' : 'stopped';
    el.innerHTML = `<span class="dot ${sc}"></span>${a.name}`;
    el.addEventListener('click', () => openApp(a.name));
    strip.appendChild(el);
  }
}

// ═══ Log pane ════════════════════════════════════════════
function buildLogPane(appName) {
  document.getElementById('log-pane').innerHTML = `
    <div id="analyze-panel" class="analyze-panel" hidden></div>
    <div class="toolbar">
      <span class="app-title">${appName}</span>
      <div class="filter-group">
        <button class="btn ${filter==='all'?'active':''}" id="f-all" onclick="setFilter('all')">All</button>
        <button class="btn ${filter==='out'?'active':''}" id="f-out" onclick="setFilter('out')">out</button>
        <button class="btn ${filter==='err'?'active':''}" id="f-err" onclick="setFilter('err')">err</button>
      </div>
      <span class="sep"></span>
      <button class="btn analyze-btn" id="btn-analyze" onclick="runAnalyze()">📊 分析</button>
      <button class="btn ${follow?'active':''}" id="btn-follow" onclick="toggleFollow()">Follow</button>
      <button class="btn" onclick="clearLogs()">Clear</button>
    </div>
    <div class="log-output" id="log-output"></div>
    <div class="status-bar">
      <span class="conn"><span class="conn-dot" id="conn-dot"></span><span id="conn-label">接続中…</span></span>
      <span id="line-count">0 lines</span>
    </div>
  `;
  document.getElementById('log-output').addEventListener('scroll', () => {
    const el = document.getElementById('log-output');
    if (!el) return;
    if (el.scrollHeight - el.clientHeight - el.scrollTop < 60 && !follow) return;
    const atBottom = el.scrollHeight - el.clientHeight - el.scrollTop < 60;
    if (!atBottom && follow) { follow = false; updateFollowBtn(); }
  });
  lineCount = 0;
}

function openApp(name) {
  if (currentSSE) { currentSSE.close(); currentSSE = null; }
  currentApp = name; lineCount = 0;

  document.getElementById('sidebar').querySelectorAll('.app-item').forEach(el =>
    el.classList.toggle('active', el.dataset.name === name));
  document.getElementById('app-strip').querySelectorAll('.app-pill').forEach(el =>
    el.classList.toggle('active', el.dataset.name === name));
  const pill = document.getElementById('app-strip').querySelector('.app-pill.active');
  if (pill) pill.scrollIntoView({ inline: 'center', behavior: 'smooth' });

  buildLogPane(name);

  const sse = new EventSource(`./api/logs/${encodeURIComponent(name)}`);
  currentSSE = sse;
  sse.addEventListener('log', e => { const d = JSON.parse(e.data); addLine(d.type, d.line); });
  sse.addEventListener('ready', () => {
    document.getElementById('conn-dot')?.classList.add('live');
    const l = document.getElementById('conn-label'); if (l) l.textContent = 'ライブ';
  });
  sse.onerror = () => {
    document.getElementById('conn-dot')?.classList.remove('live');
    const l = document.getElementById('conn-label'); if (l) l.textContent = '切断';
  };
}

function addLine(type, content) {
  if (filter !== 'all' && filter !== type) return;
  const out = document.getElementById('log-output'); if (!out) return;
  lineCount++;
  const div = document.createElement('div');
  div.className = `log-line${type === 'err' ? ' is-err' : ''}`;
  div.dataset.type = type;
  div.innerHTML = `<span class="ln">${lineCount}</span><span class="tag ${type}">${type}</span><span class="content">${esc(content)}</span>`;
  out.appendChild(div);
  const lc = document.getElementById('line-count'); if (lc) lc.textContent = `${lineCount} lines`;
  if (follow) out.scrollTop = out.scrollHeight;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function setFilter(f) {
  filter = f;
  ['all','out','err'].forEach(k => document.getElementById(`f-${k}`)?.classList.toggle('active', k === f));
  document.getElementById('log-output')?.querySelectorAll('.log-line').forEach(el => {
    el.style.display = (f === 'all' || el.dataset.type === f) ? '' : 'none';
  });
}
function toggleFollow() {
  follow = !follow; updateFollowBtn();
  if (follow) { const o = document.getElementById('log-output'); if (o) o.scrollTop = o.scrollHeight; }
}
function updateFollowBtn() { document.getElementById('btn-follow')?.classList.toggle('active', follow); }
function clearLogs() {
  const o = document.getElementById('log-output'); if (o) { o.innerHTML = ''; lineCount = 0; }
  const lc = document.getElementById('line-count'); if (lc) lc.textContent = '0 lines';
}

// ═══ Analysis ════════════════════════════════════════════
async function runAnalyze() {
  if (!currentApp) return;
  const btn = document.getElementById('btn-analyze');
  const panel = document.getElementById('analyze-panel');
  if (!btn || !panel) return;

  btn.textContent = '分析中…'; btn.classList.add('loading');

  let data, appInfo;
  try {
    data    = await fetch(`./api/analyze/${encodeURIComponent(currentApp)}`).then(r => r.json());
    appInfo = allApps.find(a => a.name === currentApp) || {};
  } catch {
    btn.textContent = '📊 分析'; btn.classList.remove('loading');
    return;
  }
  btn.textContent = '📊 分析'; btn.classList.remove('loading');

  // Determine verdict
  const restarts = appInfo.restarts || 0;
  let verdict = 'good', verdictLabel = '問題なし';
  if (data.totalErrors > 20 || restarts > 20) { verdict = 'critical'; verdictLabel = '要対処'; }
  else if (data.totalErrors > 5  || restarts > 10) { verdict = 'warning'; verdictLabel = '要確認'; }
  else if (data.totalErrors > 0  || restarts > 3)  { verdict = 'caution'; verdictLabel = '注意'; }

  // Advice
  const advice = [];
  if (appInfo.status !== 'online') advice.push('アプリが起動していません。サーバー管理者に連絡するか、pm2 restart で再起動を試みてください');
  else if (restarts > 20) advice.push(`再起動を ${restarts} 回繰り返しています。設定ファイルや外部サービスへの接続を確認してください`);
  else if (restarts > 5)  advice.push(`再起動が ${restarts} 回発生しています。エラーログを確認してください`);
  if (data.errLineCount > 50)    advice.push('エラーログに大量のメッセージがあります。アプリに深刻な問題が起きている可能性があります');
  else if (data.errLineCount > 0) advice.push(`エラーログに ${data.errLineCount} 件のメッセージがあります。下の「直近のエラー」を確認してください`);
  if (data.outErrorCount > 0)    advice.push(`通常ログにもエラー文字列が ${data.outErrorCount} 件含まれています`);
  if (advice.length === 0)       advice.push('直近のログに問題は見つかりませんでした。アプリは正常に動作しています');

  const errHtml = data.recentErrors.length > 0
    ? data.recentErrors.map(l => `<div class="err-line">${esc(l)}</div>`).join('')
    : '<div style="font-size:11px;color:var(--muted);margin-top:4px">なし</div>';

  panel.innerHTML = `
    <div class="analyze-inner">
      <div class="analyze-header">
        <span class="analyze-verdict ${verdict}">${verdictLabel}</span>
        <span class="analyze-meta">${data.analyzed.toLocaleString()} 行を分析</span>
        <button class="analyze-close" onclick="document.getElementById('analyze-panel').hidden=true">✕</button>
      </div>
      <div class="analyze-stats">
        <div class="a-stat">エラーログ <span class="${data.errLineCount>0?'err':'ok'}">${data.errLineCount} 件</span></div>
        <div class="a-stat">ログ内エラー <span class="${data.outErrorCount>0?'err':'ok'}">${data.outErrorCount} 件</span></div>
        <div class="a-stat">警告 <span class="${data.totalWarns>0?'wrn':'ok'}">${data.totalWarns} 件</span></div>
        <div class="a-stat">再起動 <span class="${restarts>5?'err':restarts>2?'wrn':'ok'}">${restarts} 回</span></div>
      </div>
      <div class="analyze-advice">
        <ul>${advice.map(a => `<li>${a}</li>`).join('')}</ul>
      </div>
      <details class="analyze-errors">
        <summary>直近のエラーメッセージ（${data.recentErrors.length}件）</summary>
        <div style="margin-top:6px">${errHtml}</div>
      </details>
    </div>
  `;
  panel.hidden = false;
}

// ═══ Init ════════════════════════════════════════════════
async function init() {
  try {
    const apps = await fetch('./api/apps').then(r => r.json());
    allApps = apps;
    renderSidebar(apps);
    renderStrip(apps);
  } catch {}

  const targetApp = new URLSearchParams(location.search).get('app');
  if (targetApp) {
    showView('logs');
    openApp(targetApp);
  } else {
    loadDashboard();
  }
  setInterval(loadDashboard, 30000);
}
init();
</script>
